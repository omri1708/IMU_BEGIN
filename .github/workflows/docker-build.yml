name: Docker build & push
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend
        run: |
          docker build -f Dockerfile.backend -t ghcr.io/${{ github.repository_owner }}/imu-backend:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository_owner }}/imu-backend:${{ github.sha }}

      - name: Build catalog
        run: |
          docker build -f Dockerfile.catalog -t ghcr.io/${{ github.repository_owner }}/imu-catalog:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository_owner }}/imu-catalog:${{ github.sha }}

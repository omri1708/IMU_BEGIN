name: crm
services:
  - name: crm_core
    endpoints:
      - POST /entities
      - GET  /entities
events:
  - entity.created
  - entity.updated
db:
  - table: entities
    columns: [id:int:pk, name:str, description:text]
ux:
  - screen: Entities
    route: /entities
iac:
  - kustomize: overlays/dev
  - helm: charts/imu
